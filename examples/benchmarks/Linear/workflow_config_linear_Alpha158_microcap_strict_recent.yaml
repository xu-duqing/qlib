qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
microcap_membership: &microcap_membership "examples/universe/a_share_microcap_10y/outputs/20260420_181751_strict_microcap_10y/members.parquet"
market: &market all
benchmark: &benchmark SH000852
microcap_universe: &microcap_universe [
    "920262.BJ","001366.SZ","002836.SZ","300030.SZ","920351.BJ","920039.BJ","300066.SZ","002549.SZ","920111.BJ","000638.SZ",
    "600448.SH","301486.SZ","002898.SZ","600783.SH","300585.SZ","300761.SZ","002272.SZ","833030.BJ","600215.SH","920445.BJ"
]
data_handler_config: &data_handler_config
    start_time: 2025-01-01
    end_time: 2025-04-17
    fit_start_time: 2025-01-01
    fit_end_time: 2025-02-28
    instruments: *microcap_universe
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
    inst_processors:
        - class: MicrocapUniverseInstProcessor
          module_path: qlib.data.inst_processor
          kwargs:
              membership_path: *microcap_membership
port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 5
            n_drop: 1
    backtest:
        start_time: 2025-03-01
        end_time: 2025-04-17
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
task:
    model:
        class: LinearModel
        module_path: qlib.contrib.model.linear
        kwargs:
            estimator: ridge
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2025-01-01, 2025-02-28]
                valid: [2025-03-03, 2025-03-31]
                test: [2025-04-01, 2025-04-17]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: True
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
